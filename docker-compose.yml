services:
  api:
    build: .
    container_name: ntpd-fastapi
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - ntpd-network

  redis:
    image: redis:7-alpine
    container_name: ntpd-redis
    ports:
      - "6379:6379"
    networks:
      - ntpd-network

networks:
  ntpd-network:
    driver: bridge